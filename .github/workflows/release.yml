name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: linux
            arch: x64
            build_command: pnpm build && pnpm exec electron-builder --linux --publish never
          - os: macos-latest
            artifact_name: macos-x64
            arch: x64
            build_command: pnpm build && pnpm exec electron-builder --mac dmg zip --x64 --publish never
          - os: macos-latest
            artifact_name: macos-arm64
            arch: arm64
            build_command: pnpm build && pnpm exec electron-builder --mac dmg zip --arm64 --publish never
          - os: windows-latest
            artifact_name: windows
            arch: x64
            build_command: pnpm build && pnpm exec electron-builder --win --publish never

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native deps for Electron
        run: pnpm exec electron-builder install-app-deps --arch=${{ matrix.arch }}

      - name: Build distributables
        run: ${{ matrix.build_command }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          ELECTRON_BUILDER_BINARIES_MIRROR: https://github.com/electron-userland/electron-builder-binaries/releases/download/
          npm_config_electron_builder_binaries_mirror: https://github.com/electron-userland/electron-builder-binaries/releases/download/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.artifact_name }}
          if-no-files-found: error
          path: |
            dist/**/*.AppImage
            dist/**/*.dmg
            dist/**/*.exe
            dist/**/*.zip
            dist/**/*.deb
            dist/**/*.snap
            dist/**/*.blockmap
            dist/**/*.yml

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Show artifact tree
        run: find release-artifacts -type f

      - name: Remove duplicate builder metadata files
        run: |
          find release-artifacts -type f \( -name "builder-debug.yml" -o -name "app-update.yml" \) -delete

      - name: Publish release assets
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"

          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --generate-notes
          else
            existing=$(gh release view "$tag" --json assets --jq '.assets[].name' || true)
            if [[ -n "$existing" ]]; then
              echo "$existing" | while read -r name; do
                gh release delete-asset "$tag" "$name" --yes || true
              done
            fi
          fi

          mapfile -t files < <(find release-artifacts -type f)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No release files found."
            exit 1
          fi

          gh release upload "$tag" "${files[@]}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
